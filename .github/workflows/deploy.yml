name: Backend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build backend
        run: npm run build

  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy stack on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script_stop: true
          script: |
            set -e

            cd /home/ubuntu/stoneacademy/stoneacademy-backend
            git pull origin main

            cd /home/ubuntu/stoneacademy/stoneacademy-dashboard
            git pull origin main

            cd /home/ubuntu/stoneacademy
            docker compose up -d --build --remove-orphans
            docker compose ps
